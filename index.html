<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>英皇芭蕾 G3 学习工具</title>
<style>
/* ===== Reset & Variables ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink-50:#fef5f7;--pink-100:#fce4ec;--pink-200:#f8bbd0;--pink-300:#f48fb1;
  --pink-400:#ec407a;--pink-500:#d81b60;--pink-600:#ad1457;--pink-700:#880e4f;
  --gold:#c9a96e;--gold-light:#f5e6cc;
  --text:#2d1b2e;--text-light:#6d5d6e;--bg:#fef5f7;--card-bg:#fff;
  --radius:12px;--shadow:0 2px 12px rgba(173,20,87,0.08);
  --font-cn:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --font-en:"Georgia","Times New Roman",serif;
}
body{
  font-family:var(--font-cn);color:var(--text);background:var(--bg);
  line-height:1.6;-webkit-tap-highlight-color:transparent;
  padding-bottom:env(safe-area-inset-bottom,20px);
}

/* ===== Navigation ===== */
nav{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,var(--pink-600),var(--pink-700));box-shadow:0 2px 16px rgba(173,20,87,0.25);}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 16px;}
.nav-title{color:#fff;font-family:var(--font-en);font-size:1.25rem;text-align:center;padding:10px 0 4px;letter-spacing:0.5px;}
.nav-tabs{display:flex;gap:4px;padding:0 0 6px;justify-content:center;}
.nav-tabs button{
  background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.8);border:none;
  padding:10px 28px;border-radius:22px;cursor:pointer;font-size:1rem;
  font-family:var(--font-cn);transition:all 0.2s;white-space:nowrap;letter-spacing:0.5px;
}
.nav-tabs button.active{background:#fff;color:var(--pink-600);font-weight:700;box-shadow:0 2px 12px rgba(0,0,0,0.12);}
.nav-tabs button:active{transform:scale(0.96);}

.sub-tabs{display:flex;gap:6px;padding:0 0 10px;justify-content:center;flex-wrap:wrap;}
.sub-tabs button{
  background:transparent;color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.25);
  padding:4px 14px;border-radius:14px;cursor:pointer;font-size:0.78rem;
  font-family:var(--font-cn);transition:all 0.2s;
}
.sub-tabs button.active{background:rgba(255,255,255,0.2);color:#fff;font-weight:600;border-color:rgba(255,255,255,0.5);}
.sub-tabs::before{content:'—';color:rgba(255,255,255,0.3);margin:0 4px;font-size:0.7rem;align-self:center;}

/* ===== Main Content ===== */
main{max-width:1100px;margin:0 auto;padding:16px;}

/* ===== Section Headers ===== */
.section-header{
  display:flex;align-items:center;gap:10px;margin:20px 0 12px;
  cursor:pointer;user-select:none;padding:8px 0;
}
.section-header h2{
  font-family:var(--font-en);font-size:1.15rem;color:var(--pink-600);
  flex:1;
}
.section-header .arrow{transition:transform 0.3s;color:var(--pink-400);font-size:1rem;}
.section-header.collapsed .arrow{transform:rotate(-90deg);}
.section-body{overflow:hidden;transition:max-height 0.4s ease;max-height:5000px;}
.section-body.collapsed{max-height:0;}

/* ===== Term Card ===== */
.term-grid{display:grid;grid-template-columns:1fr;gap:12px;}
.term-card{
  background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:16px;display:flex;flex-direction:column;gap:10px;
  border-left:3px solid var(--pink-300);transition:transform 0.15s;
}
.term-card:active{transform:scale(0.985);}
.term-card .fr-word{font-family:var(--font-en);font-size:1.2rem;color:var(--pink-600);font-style:italic;line-height:1.3;}
.term-card .zh-word{font-size:0.95rem;color:var(--text);font-weight:500;}
.term-card .term-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.term-card .term-actions button{
  background:var(--pink-100);color:var(--pink-600);border:none;
  padding:6px 14px;border-radius:18px;cursor:pointer;font-size:0.85rem;
  font-family:var(--font-cn);transition:all 0.2s;display:flex;align-items:center;gap:4px;
}
.term-card .term-actions button:hover{background:var(--pink-200);}
.term-card .term-actions button:active{transform:scale(0.94);}
.term-card .term-actions button.playing{background:var(--pink-400);color:#fff;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
.term-desc{font-size:0.8rem;color:var(--text-light);line-height:1.5;padding:6px 10px;background:var(--pink-50);border-radius:8px;border-left:2px solid var(--pink-200);}
.term-links{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.term-links a{font-size:0.73rem;padding:4px 10px;border-radius:12px;text-decoration:none;transition:all 0.2s;}
.term-link-bl{background:#fde8f0;color:#e55b8a;border:1px solid #e8a0b4;}
.term-link-bl:hover{background:#fb7299;color:#fff;}
.term-link-yt{background:#fdf5e6;color:#b8933a;border:1px solid #d4b876;}
.term-link-yt:hover{background:#c9a96e;color:#fff;}

/* Beat cell speaker */
.beat-speak{display:inline-block;margin-left:4px;cursor:pointer;font-size:0.75rem;opacity:0.5;transition:opacity 0.2s;vertical-align:middle;}
.beat-speak:hover{opacity:1;}

/* ===== Combo Card ===== */
.combo-card{
  background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:16px;margin-bottom:16px;border-top:3px solid var(--gold);
}
.combo-card h3{font-family:var(--font-en);color:var(--pink-600);font-size:1.05rem;margin-bottom:6px;}
.combo-card .combo-meta{font-size:0.85rem;color:var(--text-light);margin-bottom:10px;line-height:1.5;}
.combo-card .combo-meta strong{color:var(--text);}

/* Beat table */
.beat-toggle{
  background:var(--pink-100);color:var(--pink-600);border:none;
  padding:8px 16px;border-radius:var(--radius);cursor:pointer;
  font-size:0.88rem;font-family:var(--font-cn);width:100%;text-align:left;
  display:flex;justify-content:space-between;align-items:center;transition:background 0.2s;
}
.beat-toggle:hover{background:var(--pink-200);}
.beat-toggle .arrow2{transition:transform 0.3s;display:inline-block;}
.beat-table-wrap{overflow:hidden;transition:max-height 0.4s ease;max-height:3000px;}
.beat-table-wrap.collapsed{max-height:0;}
.beat-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:0.82rem;}
.beat-table th{background:var(--pink-600);color:#fff;padding:8px 10px;text-align:left;font-weight:500;position:sticky;top:0;}
.beat-table td{padding:6px 10px;border-bottom:1px solid var(--pink-100);vertical-align:top;}
.beat-table tr:nth-child(even) td{background:var(--pink-50);}
.beat-table .counts{white-space:nowrap;font-weight:600;color:var(--pink-600);width:80px;}

/* Video area */
.video-wrap{margin-top:12px;}
.video-wrap .yt-search-btn{
  display:inline-flex;align-items:center;gap:6px;margin-top:8px;
  background:linear-gradient(135deg,#c9a96e,#b8933a);color:#fff;
  border:none;padding:10px 20px;border-radius:24px;cursor:pointer;
  font-size:0.88rem;font-family:var(--font-cn);text-decoration:none;
  transition:all 0.2s;box-shadow:0 2px 8px rgba(201,169,110,0.3);
}
.video-wrap .yt-search-btn:hover{background:#b8933a;}

.video-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.video-links a{
  display:inline-flex;align-items:center;gap:5px;
  padding:10px 16px;border-radius:24px;cursor:pointer;
  font-size:0.85rem;font-family:var(--font-cn);text-decoration:none;
  transition:all 0.2s;white-space:nowrap;
}
.video-links .yt-btn{background:linear-gradient(135deg,#c9a96e,#b8933a);color:#fff;box-shadow:0 2px 8px rgba(201,169,110,0.3);}
.video-links .yt-btn:hover{background:#b8933a;transform:translateY(-1px);}
.video-links .bl-btn{background:linear-gradient(135deg,#fb7299,#e55b8a);color:#fff;box-shadow:0 2px 8px rgba(251,114,153,0.3);}
.video-links .bl-btn:hover{background:#e55b8a;transform:translateY(-1px);}
.video-links .browser-note{font-size:0.72rem;color:var(--text-light);margin-top:2px;width:100%;}
.video-links .browser-note span{background:var(--pink-50);padding:2px 8px;border-radius:10px;margin-right:4px;}

/* Chinese term hint in beat tables */
.cn-hint{font-size:0.72rem;color:var(--pink-400);display:block;margin-top:1px;}

/* Extended knowledge sections */
.ext-section{margin-top:16px;border:1px dashed var(--pink-200);border-radius:var(--radius);overflow:hidden;}
.ext-header{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:linear-gradient(135deg,#fce4ec,#f8e8ff);cursor:pointer;
  font-size:0.85rem;color:var(--pink-600);user-select:none;transition:background 0.2s;
}
.ext-header:hover{background:linear-gradient(135deg,#f8bbd0,#f0d8ff);}
.ext-arrow{font-size:0.7rem;transition:transform 0.3s;display:inline-block;}
.ext-label{font-weight:500;}
.ext-body{overflow:hidden;transition:max-height 0.4s ease;max-height:2000px;padding:0 14px 14px;}
.ext-body.collapsed{max-height:0;padding:0 14px;}
.ext-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px;}
.ext-card{
  background:linear-gradient(135deg,#fdf5ff,#fef5f7);border:1px solid var(--pink-100);
  border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:6px;
}
.ext-fr{font-family:var(--font-en);font-size:1rem;color:#7b1fa2;font-style:italic;line-height:1.3;}
.ext-zh{font-size:0.88rem;color:var(--text);font-weight:500;}
.ext-note{font-size:0.78rem;color:var(--text-light);line-height:1.4;}
.ext-card .term-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:4px;}
.ext-card .term-actions button{
  background:var(--pink-100);color:var(--pink-600);border:none;
  padding:5px 12px;border-radius:14px;cursor:pointer;font-size:0.78rem;
  font-family:var(--font-cn);transition:all 0.2s;
}
.ext-card .term-actions button.speed-slow{background:#ede0f5;color:#7b1fa2;}
.ext-card .term-actions button.playing{background:var(--pink-400);color:#fff;animation:pulse 1s infinite;}
.ext-card .svg-wrap{display:flex;justify-content:center;align-items:center;min-height:60px;}
.ext-card .svg-wrap svg{max-height:80px;width:auto;}

@media(min-width:640px){.ext-grid{grid-template-columns:repeat(2,1fr);}}
@media(min-width:1024px){.ext-grid{grid-template-columns:repeat(3,1fr);}}

/* ===== Responsive ===== */
@media(min-width:640px){
  .term-grid{grid-template-columns:repeat(2,1fr);}
}
@media(min-width:1024px){
  .term-grid{grid-template-columns:repeat(3,1fr);}
  main{padding:24px;}
  .nav-title{font-size:1.4rem;}
}

/* Tabs visibility */
.tab-content{display:none;}
.tab-content.active{display:block;}

/* Footer */
footer{text-align:center;padding:20px;color:var(--text-light);font-size:0.78rem;}
footer a{color:var(--pink-400);}

/* Toast */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:var(--pink-600);color:#fff;padding:10px 24px;border-radius:24px;
  font-size:0.9rem;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;
}
.toast.show{opacity:1;}
</style>
</head>

// Each SVG is a graceful dancer silhouette with proper ballet proportions
function dancerHead(){return'<ellipse cx="50" cy="20" rx="7" ry="9" fill="none" stroke="#ad1457" stroke-width="1.8"/>'}
function dancerBody(y1,y2){return`<path d="M44 ${y1} Q50 ${y1-3} 56 ${y1} L56 ${y2} Q50 ${y2+4} 44 ${y2} Z" fill="none" stroke="#ad1457" stroke-width="1.8"/>`}
function dancerTutu(y){return`<path d="M30 ${y} Q35 ${y-9} 50 ${y-7} Q65 ${y-9} 70 ${y} Q65 ${y+5} 50 ${y+3} Q35 ${y+5} 30 ${y} Z" fill="none" stroke="#d81b60" stroke-width="1.3"/>`}
function dancerLeg(x1,y1,x2,y2,x3,y3){return`<path d="M${x1} ${y1} Q${x2} ${y2} ${x3} ${y3}" fill="none" stroke="#ad1457" stroke-width="1.8" stroke-linecap="round"/>`}
function dancerFoot(x,y,toeX,toeY){return`<line x1="${x}" y1="${y}" x2="${toeX}" y2="${toeY}" stroke="#ad1457" stroke-width="1.3" stroke-linecap="round"/>`}
function dancerArm(x1,y1,x2,y2,x3,y3){return`<path d="M${x1} ${y1} Q${x2} ${y2} ${x3} ${y3}" fill="none" stroke="#ad1457" stroke-width="1.5" stroke-linecap="round"/>`}
function dancerBun(){return'<circle cx="50" cy="13" r="4" fill="none" stroke="#ad1457" stroke-width="1.2"/>'}

function renderTerms(){

  centreEl.innerHTML = renderTermGroups(termsCentre);

function renderTermGroups(groups){
  return groups.map((g,i) => {
    const id = 'tg-' + g.group.replace(/[^a-zA-Z0-9]/g,'').substring(0,20) + '-' + i;
    const extId = 'ext-' + id;
    const extensions = termExtensions[g.group];
    let extHtml = '';
    if(extensions && extensions.length > 0){
      extHtml = `
      <div class="ext-section">
        <div class="ext-header" onclick="event.stopPropagation(); toggleSection('${extId}')">
          <span class="ext-arrow">▶</span>
          <span class="ext-label">📚 拓展</span>
        </div>
        <div class="ext-body collapsed" id="${extId}">
          <div class="ext-grid">
            ${extensions.map(ext => {
              const etext = ext.fr.replace(/\s*\(.*?\)\s*/g,' ').replace(/[\/]/g,' ').trim();
              return `
              <div class="ext-card">
                <div class="ext-fr">${ext.fr}</div>
                <div class="ext-zh">${ext.zh}</div>
                <div class="ext-note">💡 ${ext.note}</div>
                <div class="term-actions">
                  <button onclick="speakFrench('${escapeHtml(etext)}', this, 0.75)">🔊 发音</button>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>`;
    }
    return `
    <div class="section-header" onclick="toggleSection('${id}')">
      <span class="arrow">▼</span>
      <h2>${g.group}</h2>
      <span class="beat-speak" onclick="event.stopPropagation();speakFrench('${escapeHtml(g.group.replace(/ — .*/,''))}', this, 0.75)" title="朗读组名" style="font-size:0.9rem;opacity:0.7;">🔊</span>
    </div>
    <div class="section-body" id="${id}">
      <div class="term-grid">
        ${g.items.map(item => renderTermCard(item)).join('')}
      </div>
      ${extHtml}
    </div>`;
  }).join('');
}

function cellWithSpeaker(text){
  if(!text || text==='—') return '—';
  const t = text.replace(/['"]/g,'').replace(/<[^>]*>/g,'');
  return `${text}<span class="beat-speak" onclick="event.stopPropagation();smartSpeak('${escapeHtml(t)}', this)" title="朗读">🔊</span>`;
}

function speakEnglish(text, btn){
  if(window._speaking){ speechSynthesis.cancel(); window._speaking = null; }
  document.querySelectorAll('.playing').forEach(b => b.classList.remove('playing'));
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-GB'; u.rate = 0.9;
  const voices = speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en-GB')) || voices.find(v => v.lang.startsWith('en'));
  if(enVoice) u.voice = enVoice;
  if(btn){ btn.classList.add('playing'); u.onend = u.onerror = () => { btn.classList.remove('playing'); window._speaking = null; }; }
  window._speaking = u;
  speechSynthesis.speak(u);
}

// ===== MyMemory Translation API =====
const transCache = {};

async function fetchMyMemory(text, fromLang, toLang){
  if(transCache[text]) return transCache[text];
  try {
    const resp = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${fromLang}|${toLang}`);
    const data = await resp.json();
    if(data.responseStatus === 200 && data.responseData.translatedText){
      const translated = data.responseData.translatedText.trim();
      transCache[text] = translated;
      return translated;
    }
  } catch(e){ console.warn('MyMemory fetch failed:', e); }
  transCache[text] = '';
  return '';
}

async function preTranslateAll(){
  // Pre-translate all commence texts (EN->ZH)
  const allCombos = [...combosBarre, ...combosCentre];
  const commenceTexts = [...new Set(allCombos.map(c => c.commence))];
  const promises = commenceTexts.map(text => fetchMyMemory(text, 'en', 'zh-CN'));
  await Promise.all(promises);

function addCnHints(text){
  if(!text || text==='—') return '';
  const displayed = [];

  // 1. French terms first — detect using our French span detector
  const frSpans = detectFrenchSpans(text);
  for(const [s,e] of frSpans){
    const frText = text.slice(s, e).toLowerCase().trim();
    // Direct match
    if(frToCn[frText]){ displayed.push(frToCn[frText]); continue; }
    // Try removing trailing 's' for plural
    const singular = frText.replace(/s$/,'');
    if(frToCn[singular]){ displayed.push(frToCn[singular]); continue; }
    // Try key word match
    for(const [k,v] of Object.entries(frToCn)){
      if(frText.includes(k) && k.length > 4){ displayed.push(v); break; }
    }
  }

  // 2. English ballet terms
  const lower = text.toLowerCase();
  const enHints = [];
  for(const [en,cn] of enToCn){
    if(lower.includes(en.toLowerCase())){
      enHints.push({en,cn});
    }
  }
  // Dedup: remove sub-phrase matches where longer match covers same concept
  const filtered = enHints.filter((h,i) => {
    for(let j=0; j<enHints.length; j++){
      if(i!==j && enHints[j].en.length > h.en.length && enHints[j].en.toLowerCase().includes(h.en.toLowerCase())){
        return false;
      }
    }
    return true;
  });
  for(const h of filtered){
    if(!displayed.includes(h.cn)) displayed.push(h.cn);
  }

  // Limit to 5 hints max, French first
  const result = displayed.slice(0, 5);
  return result.length ? '<span class="cn-hint">' + result.join(' · ') + '</span>' : '';
}

// Sort phrases longest-first so greedy matching catches longer phrases first
FR_PHRASES.sort((a,b) => b.length - a.length);

function isWordBoundary(ch){
  // A word boundary is: start/end of string, space, punctuation, or digit
  if(ch === undefined) return true;
  return /[\s.,;:!?()\-—–'"\/&|]/.test(ch) || /\d/.test(ch);
}

function detectFrenchSpans(text){
  // Returns sorted array of [start, end] character spans that are French
  const lower = text.toLowerCase();
  const spans = [];

  // 1. Multi-word phrase detection (longest-first greedy)
  for(const phrase of FR_PHRASES){
    let idx = 0;
    while(idx < lower.length){
      const pos = lower.indexOf(phrase, idx);
      if(pos === -1) break;
      // Check word boundaries
      const beforeCh = pos === 0 ? undefined : lower[pos-1];
      const afterCh = pos+phrase.length >= lower.length ? undefined : lower[pos+phrase.length];
      const beforeOk = pos === 0 || isWordBoundary(beforeCh);
      const afterOk = afterCh === undefined || isWordBoundary(afterCh);
      if(beforeOk && afterOk){
        spans.push([pos, pos+phrase.length]);
        idx = pos + phrase.length;
      } else {
        idx = pos + 1;
      }
    }
  }

  // 2. Single-word detection (only in gaps between phrase spans)
  spans.sort((a,b) => a[0]-b[0]);
  const wordRegex = /[a-zA-ZàâäéèêëîïôöùûüçœÀÂÄÉÈÊËÎÏÔÖÙÛÜÇŒ]+/g;
  let match;
  while((match = wordRegex.exec(text)) !== null){
    const w = match[0];
    const wLower = w.toLowerCase();
    // Skip if this word is inside an existing phrase span
    const wordStart = match.index;
    const wordEnd = match.index + w.length;
    const insidePhrase = spans.some(([s,e]) => s <= wordStart && e >= wordEnd);
    if(insidePhrase) continue;
    // Check if it's a French word or has French accents
    if(FR_WORDS.has(wLower) || /[éèêëàâîïôûùçœ]/i.test(w)){
      spans.push([wordStart, wordEnd]);
    }
  }

  // Merge overlapping spans
  spans.sort((a,b) => a[0]-b[0]);
  const merged = [];
  for(const [s,e] of spans){
    if(merged.length && s <= merged[merged.length-1][1]){
      merged[merged.length-1][1] = Math.max(merged[merged.length-1][1], e);
    } else {
      merged.push([s,e]);
    }
  }
  return merged;
}

function smartSpeak(text, btn){
  if(window._speaking){ speechSynthesis.cancel(); window._speaking = null; }
  document.querySelectorAll('.playing').forEach(b => b.classList.remove('playing'));
  if(btn) btn.classList.add('playing');

  const voices = speechSynthesis.getVoices();
  // Prefer same-gender voices: try female first (most common)
  const frVoice = voices.find(v => v.lang.startsWith('fr-FR') && v.name.includes('Female'))
    || voices.find(v => v.lang.startsWith('fr-FR'))
    || voices.find(v => v.lang.startsWith('fr'));
  const enVoice = voices.find(v => v.lang.startsWith('en-GB') && v.name.includes('Female'))
    || voices.find(v => v.lang.startsWith('en-GB'))
    || voices.find(v => v.lang.startsWith('en'));

  const frSpans = detectFrenchSpans(text);

  // Build segments based on character spans
  const segments = [];
  let cursor = 0;

  if(frSpans.length === 0){
    segments.push({text: text.trim(), lang: 'en'});
  } else {
    for(const [s,e] of frSpans){
      // English text before this French span
      if(cursor < s){
        const enText = text.slice(cursor, s).trim();
        if(enText) segments.push({text: enText, lang: 'en'});
      }
      // French span
      const frText = text.slice(s, e).trim();
      if(frText) segments.push({text: frText, lang: 'fr'});
      cursor = e;
    }
    // Remaining English after last French span
    if(cursor < text.length){
      const enText = text.slice(cursor).trim();
      if(enText) segments.push({text: enText, lang: 'en'});
    }
  }

  if(segments.length === 0){
    if(btn) btn.classList.remove('playing');
    return;
  }

  // Speak segments sequentially
  let idx = 0;
  function speakNext(){
    if(idx >= segments.length){
      if(btn) btn.classList.remove('playing');
      window._speaking = null;
      return;
    }
    const seg = segments[idx];
    const u = new SpeechSynthesisUtterance(seg.text);
    const isFr = seg.lang === 'fr';
    u.lang = isFr ? 'fr-FR' : 'en-GB';
    u.rate = isFr ? 0.75 : 0.9;
    u.pitch = 1.0;
    if(isFr && frVoice) u.voice = frVoice;
    if(!isFr && enVoice) u.voice = enVoice;
    u.onend = () => { idx++; speakNext(); };
    u.onerror = () => { idx++; speakNext(); };
    window._speaking = u;
    speechSynthesis.speak(u);
  }
  speakNext();
}

// ===== Tab switching =====
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
  document.querySelector(`.nav-tabs button[data-tab="${tab}"]`).classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');

  // Show appropriate sub-tabs
  const subEl = document.getElementById('subTabs');
  if(tab === 'terminology' || tab === 'combinations'){
    subEl.style.display = 'flex';
  }
  updateSubVisibility();
}

function switchSub(sub){
  currentSub = sub;
  document.querySelectorAll('.sub-tabs button').forEach(b => b.classList.remove('active'));
  document.querySelector(`.sub-tabs button[data-sub="${sub}"]`).classList.add('active');
  updateSubVisibility();
}

function updateSubVisibility(){
  const barreTerm = document.getElementById('term-barre');
  const centreTerm = document.getElementById('term-centre');
  const barreCombo = document.getElementById('combo-barre');
  const centreCombo = document.getElementById('combo-centre');

  if(currentTab === 'terminology'){
    barreTerm.style.display = currentSub === 'barre' ? 'block' : 'none';
    centreTerm.style.display = currentSub === 'centre' ? 'block' : 'none';
  } else {
    barreCombo.style.display = currentSub === 'barre' ? 'block' : 'none';
    centreCombo.style.display = currentSub === 'centre' ? 'block' : 'none';
  }
}

// ===== Toast =====
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== Escape HTML =====
function escapeHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ===== Init =====
document.querySelectorAll('.nav-tabs button').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});
document.querySelectorAll('.sub-tabs button').forEach(btn => {
  btn.addEventListener('click', () => switchSub(btn.dataset.sub));
});

renderTerms();
renderCombos();
updateSubVisibility();

// Set initial arrow states for collapsed beat tables and ext bodies
document.querySelectorAll('.beat-table-wrap.collapsed, .ext-body.collapsed').forEach(el => {
  const trigger = el.previousElementSibling;
  if(trigger){
    const arrow = trigger.querySelector('.arrow2, .ext-arrow');
    if(arrow) arrow.style.transform = 'rotate(-90deg)';
  }
});

// Async: pre-translate commence texts via MyMemory API
preTranslateAll();

</script>
